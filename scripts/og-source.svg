<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#0f2a1d"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft glow -->
  <circle cx="1050" cy="120" r="280" fill="#16a34a" opacity="0.18"/>
  <circle cx="120" cy="560" r="220" fill="#22c55e" opacity="0.12"/>

  <!-- brand lockup -->
  <g transform="translate(90 90)">
    <rect width="96" height="96" rx="28" fill="url(#mark)"/>
    <path d="M20 56h13l6-19 11 35 9-25 5.5 9H78" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="120" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">HealthyLifeStyles</text>
    <text x="120" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="6" fill="#4ade80">TRUSTED WELLNESS</text>
  </g>

  <!-- headline -->
  <text x="90" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Free Health Calculators</text>
  <text x="90" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="78" font-weight="800" fill="url(#accent)">&amp; Tools</text>

  <text x="92" y="478" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="400" fill="#94a3b8">Instant, accurate insights from scientific formulas.</text>

  <!-- trust strip -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#e2e8f0">
    <text x="92" y="560">Science-backed</text>
    <text x="358" y="560" fill="#334155">·</text>
    <text x="388" y="560">No signup</text>
    <text x="598" y="560" fill="#334155">·</text>
    <text x="628" y="560">100% Free</text>
  </g>
</svg>
