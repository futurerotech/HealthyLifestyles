name: Promote dev to main

on:
  push:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Phase 13 P2 — baseline-aware audit gate. BLOCKS only on NEW high/critical
      # advisories vs audit-baseline.json (the 22 pre-existing legacy vulns are an
      # accepted-risk ledger, out of scope by decree). Warn-only on new moderate/
      # low; hard-fails if the baseline passes its reviewBy date (rot prevention).
      - name: Audit delta (new high/critical only)
        run: node scripts/ci/audit-delta.ts

      - name: Type check
        run: npx tsc --noEmit

      # P15-P4c / D5 — the fixture proof: a missing publishDate must OMIT
      # pubDate (fabricated build-time dates are build-impossible).
      - name: Feed unit tests (D5 date integrity)
        run: npm run test:feed

      - name: Build Astro site
        run: npm run build

      - name: Internal-link audit
        run: node scripts/seo/orphan-check.ts

      - name: JSON-LD validation
        run: node scripts/seo/validate-jsonld.ts

      # P15 / D5+SD3 — BLOCKING: scans the built rss.xml + all JSON-LD for the
      # fabrication fingerprint (≥2 editorial dates at build execution time)
      # and validates the canonical feed's RSS structure.
      - name: Date-integrity guard (D5)
        run: npm run seo:dates

      # P15-P4b — non-blocking by design (script always exits 0): flags
      # article images provably below the 1200px Discover threshold and
      # refreshes docs/seo/discover-audit.md.
      - name: Discover image audit (non-blocking)
        run: npm run seo:discover

      # P15-P5a — CWV lab budget (LCP≤2.0s, CLS≤0.05, TBT≤200ms as INP lab
      # proxy). WARN-ONLY first run per decree: continue-on-error stays until
      # the HUMAN approves the baseline, then this line is removed to make the
      # budget blocking. @lhci/cli is npx-fetched in CI only — not a repo dep.
      - name: Lighthouse CWV budget (warn-only until baseline approved)
        run: npx --yes @lhci/cli@0.14.x autorun
        continue-on-error: true

      # Phase 9 P3 — external Rich Results validation. Best-effort and NON-BLOCKING:
      # the script always exits 0, and continue-on-error guarantees an external API
      # limit/timeout can never fail verify or strand the auto-promotion.
      - name: Rich Results check (non-blocking)
        run: node scripts/seo/rich-results-check.ts
        continue-on-error: true

  promote:
    name: Promote to main
    needs: verify
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Fast-forward main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "ERROR: origin/main is not an ancestor of dev — fast-forward impossible."
            echo "       main has diverged. Resolve manually; never force-push."
            exit 1
          fi
          git push origin HEAD:main
